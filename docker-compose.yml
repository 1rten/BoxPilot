services:
  boxpilot:
    build: .
    image: boxpilot:latest
    container_name: boxpilot
    network_mode: host
    environment:
      - DATA_DIR=/data
      - DB_PATH=/data/app.db
      - SINGBOX_CONFIG=/data/sing-box.json
      - SINGBOX_RESTART_CMD=/app/docker/restart-singbox.sh
      - HTTP_PROXY_PORT=7890
      - SOCKS_PROXY_PORT=7891
      - REDIRECT_PROXY_PORT=7892
      - BACKUP_KEEP=10
    volumes:
      - ./data:/data
